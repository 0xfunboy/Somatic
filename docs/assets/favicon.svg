<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="g1" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00cfff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#030d1c" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" fill="#030d1c"/>
  <rect width="64" height="64" fill="url(#g1)"/>
  <!-- Body silhouette -->
  <g filter="url(#glow)" fill="none" stroke="#00cfff" stroke-width="1.2">
    <!-- Head -->
    <circle cx="32" cy="14" r="6" stroke-opacity="0.9"/>
    <!-- Neck -->
    <line x1="32" y1="20" x2="32" y2="24"/>
    <!-- Torso -->
    <rect x="24" y="24" width="16" height="18" rx="2" stroke-opacity="0.8"/>
    <!-- Arms -->
    <line x1="24" y1="26" x2="16" y2="36"/>
    <line x1="40" y1="26" x2="48" y2="36"/>
    <!-- Legs -->
    <line x1="28" y1="42" x2="24" y2="56"/>
    <line x1="36" y1="42" x2="40" y2="56"/>
  </g>
  <!-- Neural pulse on spine -->
  <line x1="32" y1="24" x2="32" y2="42" stroke="#7040e8" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.9"/>
  <!-- Sensor dots -->
  <circle cx="32" cy="14" r="2.5" fill="#00cfff" opacity="0.9"/>
  <circle cx="32" cy="33" r="3" fill="#7040e8" opacity="0.8"/>
  <circle cx="16" cy="36" r="2" fill="#00cfff" opacity="0.7"/>
  <circle cx="48" cy="36" r="2" fill="#00cfff" opacity="0.7"/>
  <!-- Corner marks -->
  <polyline points="2,2 2,8 8,2" stroke="#00cfff" stroke-width="1" fill="none" opacity="0.5"/>
  <polyline points="62,2 62,8 56,2" stroke="#00cfff" stroke-width="1" fill="none" opacity="0.5"/>
  <polyline points="2,62 2,56 8,62" stroke="#00cfff" stroke-width="1" fill="none" opacity="0.5"/>
  <polyline points="62,62 62,56 56,62" stroke="#00cfff" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
